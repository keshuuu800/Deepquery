<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DeepQuery — Knowledge from the Deep</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow-x:hidden;background:#000}
body{font-family:'Inter',sans-serif;color:#e8f4f2}

/* ═══════════════════════════════
   REAL VIDEO BACKGROUND
═══════════════════════════════ */
#video-wrap{
  position:fixed;inset:0;z-index:0;
  background:#000a14;
  overflow:hidden;
}
#bg-video{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  min-width:100%;min-height:100%;
  width:auto;height:auto;
  object-fit:cover;
  will-change:transform;
}

/* Fallback image while video loads */
#video-wrap::before{
  content:'';
  position:absolute;inset:0;z-index:1;
  background:
    url('https://images.unsplash.com/photo-1583212292454-1fe6229603b7?w=1920&q=85&fm=webp')
    center/cover no-repeat;
  transition:opacity 1s ease;
}
#video-wrap.loaded::before{opacity:0}

/* Dark gradient overlay — keeps text readable */
#video-wrap::after{
  content:'';
  position:absolute;inset:0;z-index:2;
  background:
    linear-gradient(
      to bottom,
      rgba(0,10,20,0.45) 0%,
      rgba(0,8,18,0.25) 25%,
      rgba(0,6,14,0.20) 55%,
      rgba(0,5,12,0.55) 100%
    ),
    radial-gradient(ellipse at center, rgba(0,0,0,0) 25%, rgba(0,5,14,0.50) 100%);
}

/* ═══════════════════════════════
   UI
═══════════════════════════════ */
#ui{position:relative;z-index:10;min-height:100vh}

/* ── NAV ── */
#nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:1.3rem 2.8rem;
  transition:background .5s,border-color .5s;
  border-bottom:1px solid transparent;
}
#nav.scrolled{
  background:rgba(0,8,18,0.88);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom-color:rgba(168,230,223,0.1);
}
.nav-logo{
  font-family:'Cormorant Garamond',serif;
  font-size:1.45rem;font-weight:400;font-style:italic;
  color:#a8e6df;letter-spacing:.01em;
  text-shadow:0 2px 12px rgba(0,0,0,0.6);
}
.nav-tag{
  font-size:.64rem;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(168,230,223,0.55);
  text-shadow:0 1px 6px rgba(0,0,0,0.6);
}

/* ── HERO ── */
#hero{
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:7rem 2rem 5rem;
  text-align:center;
  position:relative;
}

.eyebrow{
  font-size:.64rem;letter-spacing:.26em;text-transform:uppercase;
  color:rgba(168,230,223,0.75);
  display:flex;align-items:center;gap:.9rem;
  margin-bottom:1.8rem;
  animation:fadeUp .9s ease both;
  text-shadow:0 1px 8px rgba(0,0,0,0.7);
}
.eyebrow::before,.eyebrow::after{
  content:'';width:28px;height:1px;
  background:linear-gradient(to right,transparent,rgba(168,230,223,0.45));
}
.eyebrow::after{transform:scaleX(-1)}

.hero-h1{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(4rem,10vw,9.5rem);
  font-weight:300;letter-spacing:-.025em;line-height:.9;
  margin-bottom:1.8rem;
  animation:fadeUp .9s .1s ease both;
  text-shadow:0 4px 32px rgba(0,0,0,0.7);
}
.hero-h1 .plain{
  display:block;
  color:rgba(232,244,242,0.96);
}
.hero-h1 em{
  display:block;font-style:italic;
  background:linear-gradient(160deg,#a8e6df 0%,#0eb5a0 55%,rgba(8,160,140,0.7) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

.hero-sub{
  font-size:clamp(.88rem,1.8vw,1.05rem);font-weight:300;
  color:rgba(200,235,232,0.65);
  max-width:420px;line-height:1.8;
  margin:0 auto 3.2rem;
  animation:fadeUp .9s .2s ease both;
  text-shadow:0 2px 12px rgba(0,0,0,0.7);
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(22px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── SEARCH ── */
.search-wrap{
  width:100%;max-width:640px;
  animation:fadeUp .9s .3s ease both;
}
.search-box{
  display:flex;align-items:center;gap:.5rem;
  background:rgba(0,12,26,0.58);
  border:1px solid rgba(168,230,223,0.25);
  padding:.6rem .6rem .6rem 1.6rem;
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border-radius:6px;
  box-shadow:0 8px 40px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.04);
  transition:border-color .3s,box-shadow .3s;
}
.search-box:focus-within{
  border-color:rgba(14,181,160,0.55);
  box-shadow:0 0 0 1px rgba(14,181,160,0.18),0 12px 48px rgba(0,0,0,0.5);
}
#si{
  flex:1;background:none;border:none;outline:none;
  color:#e8f4f2;font-family:'Inter',sans-serif;
  font-size:.97rem;font-weight:300;caret-color:#0eb5a0;
}
#si::placeholder{color:rgba(168,230,223,0.3)}
#sb{
  flex-shrink:0;background:#0eb5a0;color:#000d1a;
  border:none;border-radius:4px;padding:.75rem 1.6rem;
  font-family:'Inter',sans-serif;font-size:.8rem;font-weight:500;
  letter-spacing:.07em;text-transform:uppercase;cursor:pointer;
  transition:background .2s,transform .15s,box-shadow .2s;
  white-space:nowrap;
}
#sb:hover{background:#0ccab4;transform:translateY(-1px);box-shadow:0 4px 20px rgba(14,181,160,0.45)}
#sb:active{transform:none}
#sb:disabled{opacity:.4;cursor:not-allowed;transform:none}

.hints{
  display:flex;flex-wrap:wrap;gap:.4rem;
  justify-content:center;margin-top:1.1rem;
}
.hp{
  padding:.3rem .9rem;border:1px solid rgba(168,230,223,0.15);
  border-radius:3px;font-size:.7rem;
  color:rgba(168,230,223,0.5);cursor:pointer;
  background:rgba(0,12,26,0.35);
  backdrop-filter:blur(8px);transition:all .22s;
  text-shadow:0 1px 4px rgba(0,0,0,0.5);
}
.hp:hover{
  border-color:rgba(14,181,160,0.5);color:#a8e6df;
  background:rgba(14,181,160,0.1);
}

/* ── DEPTH METER ── */
#depth-side{
  position:fixed;right:2.2rem;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;align-items:center;gap:.5rem;
  z-index:20;
  animation:fadeUp 1s .8s ease both;opacity:0;
}
#depth-side.show{opacity:1}
#dzone{
  font-size:.54rem;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(168,230,223,0.5);writing-mode:vertical-rl;
  text-shadow:0 1px 6px rgba(0,0,0,0.7);
}
.d-bar{width:1px;height:52px;background:linear-gradient(to bottom,rgba(14,181,160,.4),transparent)}
#dnum{font-size:.54rem;color:rgba(14,181,160,.65);font-variant-numeric:tabular-nums}

/* ── SCROLL CUE ── */
.scroll-cue{
  position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:.5rem;
  color:rgba(168,230,223,0.5);font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;
  opacity:0;animation:fadeUp 1s 1.2s ease both,bob 2.2s 2.4s ease-in-out infinite;
}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(5px)}}
.sc-line{width:1px;height:26px;background:linear-gradient(to bottom,rgba(14,181,160,.45),transparent)}

/* ── STAGE ── */
#stage{display:none;padding:3rem 2rem 0}
#stage.on{display:block}
.si2{max-width:820px;margin:0 auto}

.ap{
  background:rgba(0,10,22,0.78);
  border:1px solid rgba(14,181,160,0.18);
  padding:1.4rem 2rem;margin-bottom:1.5rem;
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-radius:10px;
  box-shadow:0 8px 40px rgba(0,0,0,0.4);
  display:flex;align-items:center;gap:1.2rem;flex-wrap:wrap;
}
.ap-lbl{font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(14,181,160,.6);margin-bottom:.3rem}
.ap-ttl{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:400;font-style:italic;color:#a8e6df}
.wl{font-size:.7rem;color:rgba(14,181,160,.65);text-decoration:none;margin-left:auto;transition:color .2s;white-space:nowrap}
.wl:hover{color:#0eb5a0}

/* ── CHAT ── */
#chat{max-width:820px;margin:0 auto;display:flex;flex-direction:column;padding-bottom:9rem}
.msg{
  display:flex;gap:1rem;padding:1.4rem 0;
  border-bottom:1px solid rgba(14,181,160,.06);
  animation:fadeUp .3s ease both;
}
.msg.user{flex-direction:row-reverse;}
.msg.user .mb{text-align:right}
.msg.user .mt{background:rgba(0,6,10,0.72);border-color:rgba(0,0,0,0.25);color:rgba(232,244,242,0.96)}
.msg-lbl{
  flex-shrink:0;width:34px;font-size:.58rem;
  letter-spacing:.12em;text-transform:uppercase;
  color:rgba(168,230,223,0.42);font-weight:500;
  border-top:1px solid rgba(14,181,160,.14);
  padding-top:.42rem;white-space:nowrap;
}
.msg.user .msg-lbl{color:rgba(14,181,160,.75)}
.mb{flex:1}
.mr{font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:rgba(168,230,223,0.38);margin-bottom:.55rem}
.msg.user .mr{color:rgba(14,181,160,.75)}
.mt{
  font-size:.93rem;line-height:1.85;font-weight:300;
  background:rgba(0,14,30,0.62);
  border:1px solid rgba(168,230,223,0.1);
  border-radius:10px;padding:.9rem 1.1rem;
  backdrop-filter:blur(16px);
  color:rgba(210,238,235,0.9);
}
.msg.user .mt{
  background:rgba(14,181,160,0.1);
  border-color:rgba(14,181,160,0.22);
  color:rgba(168,230,223,0.95);
}
.mt p{margin-bottom:.5em}.mt p:last-child{margin-bottom:0}

.answer-media{margin-bottom:.6rem}
.answer-media img{max-width:320px;border-radius:8px;display:block}
/* Lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;align-items:center;justify-content:center;z-index:300}
.lightbox img{max-width:92%;max-height:86%;border-radius:6px}
.lightbox .caption{color:#cfeee9;margin-top:.6rem;text-align:center}

/* ── DOTS ── */
.dots{display:flex;gap:5px;padding:.25rem 0}
.dots span{
  width:4px;height:4px;border-radius:50%;
  background:rgba(14,181,160,.55);
  animation:dp 1.1s ease-in-out infinite;
}
.dots span:nth-child(2){animation-delay:.18s}
.dots span:nth-child(3){animation-delay:.36s}
@keyframes dp{0%,80%,100%{transform:scale(.5);opacity:.2}40%{transform:scale(1);opacity:1}}

/* ── QBAR ── */
#qbar{
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  padding:.8rem 2rem 1.8rem;
  background:linear-gradient(to top,rgba(0,5,14,0.97) 60%,transparent);
  display:none;
}
#qbar.on{display:block}
.qi{
  max-width:820px;margin:0 auto;
  display:flex;align-items:center;gap:.5rem;
  background:rgba(0,10,24,0.88);
  border:1px solid rgba(14,181,160,0.2);
  padding:.52rem .52rem .52rem 1.4rem;
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border-radius:6px;
  box-shadow:0 8px 40px rgba(0,0,0,0.5);
  transition:border-color .25s,box-shadow .25s;
}
.qi:focus-within{
  border-color:rgba(14,181,160,0.5);
  box-shadow:0 0 0 1px rgba(14,181,160,0.12),0 8px 40px rgba(0,0,0,0.55);
}
#qi{
  flex:1;background:none;border:none;outline:none;
  color:#e8f4f2;font-family:'Inter',sans-serif;
  font-size:.9rem;font-weight:300;caret-color:#0eb5a0;
}
#qi::placeholder{color:rgba(168,230,223,0.22)}
#ab{
  flex-shrink:0;background:rgba(14,181,160,0.12);
  border:1px solid rgba(14,181,160,0.3);color:#0eb5a0;
  padding:.65rem 1.3rem;font-family:'Inter',sans-serif;
  font-size:.76rem;font-weight:500;letter-spacing:.09em;
  text-transform:uppercase;cursor:pointer;border-radius:4px;transition:all .2s;
}
#ab:hover{background:rgba(14,181,160,0.22);border-color:rgba(14,181,160,0.55);box-shadow:0 0 18px rgba(14,181,160,0.2)}
#ab:disabled{opacity:.3;cursor:not-allowed}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:5.5rem;left:50%;
  transform:translateX(-50%) translateY(8px);
  background:rgba(0,10,22,0.96);border:1px solid rgba(14,181,160,0.22);
  color:#a8e6df;padding:.6rem 1.3rem;
  font-size:.76rem;opacity:0;pointer-events:none;
  transition:opacity .25s,transform .25s;z-index:200;white-space:nowrap;
  backdrop-filter:blur(20px);border-radius:4px;
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{border-color:rgba(244,80,80,.35);color:#fb7185}
#toast.ok{border-color:rgba(14,181,160,.45);color:#0eb5a0}

/* ── VIDEO LOAD BAR ── */
#load-bar{
  position:fixed;top:0;left:0;z-index:999;height:2px;
  background:linear-gradient(to right,#0eb5a0,#a8e6df);
  width:0%;transition:width .4s ease;
  box-shadow:0 0 8px rgba(14,181,160,0.7);
  pointer-events:none;
}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#000814}
::-webkit-scrollbar-thumb{background:rgba(14,181,160,.2)}
@media(max-width:640px){
  #nav{padding:1rem 1.2rem}
  #depth-side{display:none}
  .hero-h1{font-size:clamp(3.2rem,13vw,5rem)}
  #stage,#qbar{padding-left:1rem;padding-right:1rem}
  .ap{flex-direction:column}.wl{margin-left:0}
}
@media(prefers-reduced-motion:reduce){
  *{animation-duration:.01ms!important;transition-duration:.01ms!important}
  #bg-video{display:none}
}
</style>
</head>

  <section id="hero">

<script>
/* ── VIDEO LOADER ── */
(()=>{
  const video = document.getElementById('bg-video');
  const wrap  = document.getElementById('video-wrap');
  const bar   = document.getElementById('load-bar');
  let pct = 0;

  const tickBar = setInterval(()=>{
    pct = Math.min(pct + Math.random()*5, 88);
    bar.style.width = pct + '%';
  }, 220);

  function finishBar(){
    clearInterval(tickBar);
    bar.style.width = '100%';
    setTimeout(()=>{ bar.style.opacity='0'; }, 700);
  }

  // Defer loading so the page paints first
  let started = false;
  function startLoad(){
    if(started) return; started = true;
    video.preload = 'auto';
    video.load();
  }
  setTimeout(startLoad, 600);
  ['touchstart','mousemove','scroll','keydown'].forEach(ev=>{
    window.addEventListener(ev, startLoad, {once:true, passive:true});
  });

  video.addEventListener('canplay', ()=>{
    wrap.classList.add('loaded');
    finishBar();
    video.play().catch(()=>{});
  });

  video.addEventListener('error', ()=>{ finishBar(); });

  // Pause when tab hidden
  document.addEventListener('visibilitychange', ()=>{
    document.hidden ? video.pause() : video.play().catch(()=>{});
  });

  // Remove video on very slow connections
  if(navigator.connection){
    const c = navigator.connection;
    if(c.saveData || c.effectiveType==='slow-2g' || c.effectiveType==='2g'){
      video.remove(); finishBar();
    }
  }
})();

/* ── SCROLL / DEPTH ── */
const ZONES=[
  {t:0,   l:'Surface'},      {t:.08, l:'Sunlit Zone'},
  {t:.22, l:'Twilight Zone'},{t:.45, l:'Midnight Zone'},
  {t:.72, l:'Abyssal Zone'}, {t:1,   l:'Hadal Zone'},
];
const getZone = p => { for(let i=ZONES.length-1;i>=0;i--) if(p>=ZONES[i].t) return ZONES[i]; return ZONES[0]; };
const $dnum = document.getElementById('dnum');
const $dzone= document.getElementById('dzone');
const $nav  = document.getElementById('nav');

window.addEventListener('scroll',()=>{
  const p = scrollY / (document.body.scrollHeight - innerHeight || 1);
  $dnum.textContent = Math.round(p*11000) + 'm';
  $dzone.textContent = getZone(p).l;
  $nav.classList.toggle('scrolled', scrollY > 60);
},{passive:true});

/* ── APP ── */
const S = {query:'', loading:false, history:[]};
const $ = id => document.getElementById(id);
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

$('hints').addEventListener('click', e=>{
  const p = e.target.closest('.hp'); if(!p) return;
  $('si').value = p.dataset.q; doSearch();
});
$('si').addEventListener('keydown', e=>e.key==='Enter'&&doSearch());
$('sb').addEventListener('click', doSearch);
$('qi').addEventListener('keydown', e=>e.key==='Enter'&&doAsk());
$('ab').addEventListener('click', doAsk);

let _tt;
function toast(msg,type=''){
  const el=$('toast'); el.textContent=msg;
  el.className='on'+(type?' '+type:'');
  clearTimeout(_tt); _tt=setTimeout(()=>el.className='',3200);
}

function addMsg(role,text,image){
  const w=document.createElement('div'); w.className='msg '+role;
  // Format plain text: handle newlines and bullet points nicely
  function formatText(t){
    return t.split('\n').filter(l=>l.trim()).map(line=>{
      line = esc(line.trim());
      // Bullet lines
      if(/^[•\-\*]\s+/.test(line)) return `<p style="padding-left:.8rem;position:relative"><span style="position:absolute;left:0;color:#0eb5a0">•</span> ${line.replace(/^[•\-\*]\s+/,'')}</p>`;
      // Numbered list lines
      if(/^\d+\.\s+/.test(line)) return `<p style="padding-left:1.2rem;position:relative"><span style="position:absolute;left:0;color:#0eb5a0">${line.match(/^\d+/)[0]}.</span> ${line.replace(/^\d+\.\s+/,'')}</p>`;
      return `<p>${line}</p>`;
    }).join('');
  }
  // include image for bot answers when available. `image` may be a URL or an object
  let mediaHtml = '';
  if(role==='bot' && image){
    if(typeof image === 'string'){
      mediaHtml = `<div class="answer-media"><img src="${esc(image)}" alt="" data-large="${esc(image)}"/></div>`;
    } else if(Array.isArray(image) && image.length){
      // show top image and small thumbnails for alternatives
      const top = image[0];
      mediaHtml = `<div class="answer-media"><img src="${esc(top.url)}" alt="${esc(top.alt||top.section||'')||''}" data-large="${esc(top.url)}"/></div>`;
      // thumbnails
      if(image.length>1){
        mediaHtml += `<div style="display:flex;gap:8px;margin-top:6px">`;
        image.slice(1,5).forEach(it=>{
          mediaHtml += `<img src="${esc(it.url)}" alt="${esc(it.alt||it.section||'')}" style="width:64px;height:64px;object-fit:cover;border-radius:6px;cursor:pointer" data-large="${esc(it.url)}"/>`;
        });
        mediaHtml += `</div>`;
      }
    } else if(typeof image === 'object' && image.url){
      mediaHtml = `<div class="answer-media"><img src="${esc(image.url)}" alt="${esc(image.alt||image.section||'')}" data-large="${esc(image.url)}"/></div>`;
    }
  }
  w.innerHTML=`<div class="msg-lbl">${role==='user'?'You':'Deep'}</div>
    <div class="mb"><div class="mr">${role==='user'?'Question':'Answer'}</div>
    <div class="mt">${mediaHtml}${formatText(text)}</div></div>`;
  $('chat').appendChild(w); w.scrollIntoView({behavior:'smooth',block:'end'});
}
function addLoader(){
  const w=document.createElement('div'); w.id='ldr'; w.className='msg bot';
  w.innerHTML=`<div class="msg-lbl">Deep</div><div class="mb"><div class="mr">Answer</div><div class="dots"><span></span><span></span><span></span></div></div>`;
  $('chat').appendChild(w); w.scrollIntoView({behavior:'smooth',block:'end'});
}
function rmLoader(){const e=$('ldr');if(e)e.remove();}

async function doSearch(){
  const q=$('si').value.trim(); if(!q||S.loading) return;
  S.loading=true; const btn=$('sb'); btn.disabled=true; btn.textContent='…';
  try{
    const res=await fetch('/api/search',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:q})});
    const d=await res.json();
    if(!res.ok){toast(d.error||'Search failed','err');return;}
    S.query=q; S.history=[];
    $('an').textContent=d.title; $('al').href=d.url;
    const imgEl = $('article-img');
    const imgWrap = $('article-media');
    if(d.image_url){
      imgEl.src = d.image_url;
      imgEl.alt = `Image for ${d.title}`;
      imgWrap.style.display = 'block';
    } else {
      imgEl.src = '';
      imgWrap.style.display = 'none';
    }
    $('stage').classList.add('on'); $('qbar').classList.add('on');
    $('chat').innerHTML='';
    setTimeout(()=>$('stage').scrollIntoView({behavior:'smooth',block:'start'}),100);
    addMsg('bot',`Surfaced the Wikipedia article for "${d.title}".\nAsk me anything about it.`);
    if(d.title.toLowerCase()!==q.toLowerCase()) toast(`"${q}" → "${d.title}"`,'ok');
    $('qi').focus();
  } catch{ toast('Network error — is the backend running?','err'); }
  finally{ S.loading=false; btn.disabled=false; btn.textContent='Dive in'; }
}

async function doAsk(){
  const question=$('qi').value.trim();
  if(!question||!S.query||S.loading) return;
  S.loading=true; $('ab').disabled=true; $('qi').value='';
  addMsg('user',question); addLoader();
  const historyToSend = S.history.slice(-10);
  try{
    const res=await fetch('/api/ask',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({query:S.query, question, history: historyToSend})
    });
    const d=await res.json(); rmLoader();
    if(!res.ok){addMsg('bot','⚠ '+(d.error||'Something went wrong.'));return;}
    S.history.push({role:'user', content: question});
    S.history.push({role:'assistant', content: d.answer});
    // prefer server-provided ranked list (`d.images`) for richer UI, fallback to `d.image`
    const imgs = (d.images && d.images.length) ? d.images : (d.image ? [{url: d.image, alt: ''}] : []);
    addMsg('bot', d.answer, imgs.length? imgs : (d.image || d.image_url || null));
    // attach click handlers for lightbox
    setTimeout(()=>{
      document.querySelectorAll('.answer-media img').forEach(imgEl=>{
        imgEl.style.cursor = 'zoom-in';
        imgEl.addEventListener('click', ()=>openLightbox(imgEl.dataset.large || imgEl.src, imgEl.alt || ''));
      });
      document.querySelectorAll('.answer-media img[style]').forEach(th=>{
        th.addEventListener('click', ()=>openLightbox(th.dataset.large || th.src, th.alt || ''));
      });
    },80);
  } catch{ rmLoader(); addMsg('bot','⚠ Network error — is the backend running?'); }
  finally{ S.loading=false; $('ab').disabled=false; $('qi').focus(); }
}

// Simple lightbox
function openLightbox(src, caption){
  let lb = document.getElementById('lb');
  if(!lb){
    lb = document.createElement('div'); lb.id='lb'; lb.className='lightbox';
    lb.innerHTML = `<div style="text-align:center"><img id="lbimg" src="" alt=""/><div class="caption" id="lbcap"></div></div>`;
    document.body.appendChild(lb);
    lb.addEventListener('click', ()=>{ lb.style.display='none'; });
  }
  document.getElementById('lbimg').src = src;
  document.getElementById('lbcap').textContent = caption || '';
  lb.style.display = 'flex';
}
</script>
